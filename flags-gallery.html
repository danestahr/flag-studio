<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GolfStatus Design Studio — Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:1.5rem">
    <a href="/" class="back-link"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Projects</a>
    <div class="logo"><svg class="logo-mark" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GolfStatus"><path d="M41.71 49.73H8.02C3.6 49.73 0 46.13 0 41.71V8.02C0 3.6 3.6 0 8.02 0H41.71C46.13 0 49.73 3.6 49.73 8.02V41.71C49.73 46.13 46.13 49.73 41.71 49.73ZM8.02 0.93C4.11 0.93 0.93 4.11 0.93 8.02V41.71C0.93 45.62 4.11 48.8 8.03 48.8H41.72C45.63 48.8 48.82 45.62 48.82 41.71V8.02C48.82 4.11 45.64 0.93 41.72 0.93H8.02Z" fill="currentColor"/><path d="M24.87 6.61999C16.97 6.61999 10.55 13.09 10.55 21.05C10.55 23.87 11.36 26.6 12.89 28.95L12.93 29.01C13.1 29.27 13.29 29.54 13.48 29.79L23.23 42.44C23.23 42.44 23.23 42.44 23.23 42.45L23.72 43.12V42.43C23.72 37.55 22.25 35.63 21.73 34.83C21.63 34.67 21.66 34.4 21.65 34.17C21.65 34.05 21.75 33.96 21.86 33.97C22.84 34.23 23.85 34.36 24.88 34.36C25.91 34.36 26.93 34.23 27.91 33.97C28.01 33.97 28.09 34.06 28.09 34.17C28.09 34.39 28.12 34.67 28.01 34.83C27.49 35.63 26.02 37.55 26.02 42.43V43.07L26.71 42.17L36.17 29.88C38.14 27.33 39.18 24.27 39.18 21.04C39.18 13.09 32.76 6.60999 24.86 6.60999L24.87 6.61999ZM31.91 30.43C29.85 31.95 27.42 32.75 24.88 32.75C21.08 32.75 17.47 30.9 15.23 27.81C11.35 22.46 12.52 14.92 17.83 11.01C19.89 9.48999 22.32 8.68998 24.86 8.68998C28.66 8.68998 32.27 10.54 34.51 13.63C38.39 18.98 37.22 26.52 31.91 30.43Z" fill="currentColor"/></svg>GolfStatus Design Studio</div><span class="beta-tag">Beta</span>
  </div>
  <span class="header-sub">Tournament flag configurator</span>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <div class="panel visible" id="panel-5">
      <div><div class="ptitle">Gallery</div><div class="psub">Review all variations and export.</div></div>
      <div class="var-gallery-layout">
        <div id="varList" class="var-list"></div>
        <div class="var-details-sticky">
          <div class="review-card">
            <button class="btn sm primary" style="width:100%;justify-content:center" onclick="expAllPDF()"><i class="fa-solid fa-download" aria-hidden="true"></i> Download all as PDF</button>
            <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--gray-100)">
              <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);font-weight:500;margin-bottom:6px">Print files</div>
              <button class="btn sm primary" style="width:100%;justify-content:center" id="expPrintPdfBtn" onclick="downloadForPrint()"><i class="fa-solid fa-download" aria-hidden="true"></i> Print download (PDF zip)</button>
              <div id="expPrintStatus" style="font-size:12px;color:var(--gray-600);min-height:14px;margin-top:6px"></div>
              <button class="btn sm" style="width:100%;justify-content:center;margin-top:6px" onclick="sendToPrestige()"><i class="fa-solid fa-envelope" aria-hidden="true"></i> Send to Prestige Flag</button>
            </div>
            <div class="share-section" id="shareSection">
              <div class="rc-title">Share for review</div>
              <div id="shareStatus" style="font-size:13px;color:var(--gray-400);min-height:16px"></div>
              <button class="btn sm primary" style="width:100%;justify-content:center" onclick="openShareModal()">Share for review <i class="fa-solid fa-arrow-right" aria-hidden="true"></i></button>
            </div>
          </div>
        </div>
      </div>
      <div class="arow">
        <button class="btn" id="backToVariationsBtn"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Variations</button>
      </div>
    </div>
  </main>
</div>

<!-- Share modal -->
<div class="share-modal-overlay" id="shareModalOverlay" style="display:none" onclick="closeShareModal(event)">
  <div class="share-modal">
    <div class="share-modal-header">
      <span class="share-modal-title">Share for review</span>
      <button class="share-modal-close" onclick="closeShareModal()" aria-label="Close"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
    </div>
    <div class="share-modal-body">
      <p class="share-modal-label">Review link</p>
      <div class="share-link-box">
        <input class="share-link-input" id="shareLinkInput" readonly>
        <button class="btn sm" onclick="copyShareLink()">Copy</button>
      </div>
      <p class="share-modal-label" style="margin-top:1.25rem">Notify customer by email</p>
      <input class="share-email-input" id="shareEmailInput" type="email" placeholder="customer@email.com">
      <div id="shareNotifyStatus" style="font-size:13px;color:var(--gray-400);min-height:16px;margin-top:6px"></div>
      <button class="btn sm primary" style="width:100%;justify-content:center;margin-top:8px" onclick="notifyCustomer()">Send notification</button>
    </div>
  </div>
</div>

<script type="module" src="/src/flags/gallery.js"></script>
<script>
  document.getElementById('backToVariationsBtn').addEventListener('click', () => {
    const p = new URLSearchParams(window.location.search).get('project');
    if (p) window.location.href = 'flags-variations.html?project=' + p;
  });
</script>
</body>
</html>
